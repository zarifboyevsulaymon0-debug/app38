<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather & Advice</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .hub-container {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #334155;
            color: white;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .weather-info h1 { font-size: 3rem; margin: 10px 0; }
        
        .advice-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            font-style: italic;
            color: #94a3b8;
        }

        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="hub-container">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Shahar nomi..." value="Tashkent">
        <button onclick="getWeather()">Qidirish</button>
    </div>

    <div class="weather-info" id="weatherContent">
        <h2 id="cityName">---</h2>
        <h1 id="temp">--°C</h1>
        <p id="desc">Holat: ---</p>
    </div>

    <div class="advice-section">
        <p><strong>Kun maslahati:</strong></p>
        <p id="adviceText">Yuklanmoqda...</p>
        <button onclick="getAdvice()" style="background:none; color:var(--accent); padding:5px; font-size:12px;">Yangilash</button>
    </div>
</div>

<script>
    // Ob-havo ma'lumotlarini olish (Bepul API)
    async function getWeather() {
        const city = document.getElementById('cityInput').value;
        const weatherContent = document.getElementById('weatherContent');
        weatherContent.classList.add('loading');

        try {
            // Diqqat: Bu ochiq API, kalit talab qilmaydigan versiyasi (demo uchun)
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=41.26&longitude=69.21&current_weather=true`);
            const data = await response.json();
            
            document.getElementById('cityName').innerText = city.toUpperCase();
            document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°C";
            document.getElementById('desc').innerText = "Shamol tezligi: " + data.current_weather.windspeed + " km/h";
        } catch (error) {
            alert("Xatolik yuz berdi!");
        }
        weatherContent.classList.remove('loading');
    }

    // Tasodifiy maslahat olish
    async function getAdvice() {
        try {
            const response = await fetch('https://api.adviceslip.com/advice');
            const data = await response.json();
            document.getElementById('adviceText').innerText = `"${data.slip.advice}"`;
        } catch (error) {
            document.getElementById('adviceText').innerText = "Maslahat yuklab bo'lmadi.";
        }
    }

    // Sahifa yuklanganda ishlash
    getWeather();
    getAdvice();
</script>

</body>
</html>
